# docker-compose.yml — Oráculo UEMA v6.2 (Dev/Stable) - Langfuse V2 (Empresa / WSL)
networks:
  oraculo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  postgres_data:
  redis_data:
  langfuse_db_data:
  grafana_data:
  prometheus_data:

x-app-env: &app-env
  env_file: .env
  environment:
    # Usando IPs fixos para blindar contra falhas de DNS do WSL
    REDIS_URL: "redis://172.18.0.50:6379/0"
    DATABASE_URL: "postgresql+asyncpg://user:${POSTGRES_PASSWORD}@172.18.0.40:5432/oraculo"
    LANGFUSE_HOST: "http://langfuse:3000"
    LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
    LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-build: &build
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime

services:
  # ── Infraestrutura Oráculo ──
  postgres:
    image: postgres:16-alpine
    container_name: oraculo_postgres
    <<: [*restart, *logging]
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.40
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oraculo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata

  redis:
    image: redis/redis-stack:latest
    container_name: oraculo_redis
    <<: [*restart, *logging]
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.50
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru"
    ports:
      - "8001:8001"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: oraculo_redis_exporter
    <<: [*restart, *logging]
    environment:
      REDIS_ADDR: "redis://172.18.0.50:6379"
    networks:
      - oraculo_net

  # ── Observabilidade (Prometheus/Grafana) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: oraculo_prometheus
    <<: [*restart, *logging]
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - oraculo_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: oraculo_grafana
    <<: [*restart, *logging]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - oraculo_net

  # ── Langfuse V2 (Estável, sem ClickHouse) ──
  langfuse_db:
    image: postgres:16-alpine
    container_name: oraculo_langfuse_db
    <<: [*restart, *logging]
    networks:
      - oraculo_net
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse_pass}
      POSTGRES_DB: langfuse
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: oraculo_langfuse
    <<: [*restart, *logging]
    ports:
      - "3000:3000"
    networks:
      - oraculo_net
    environment:
      DATABASE_URL: "postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse_pass}@langfuse_db:5432/langfuse"
      NEXTAUTH_SECRET: "${LANGFUSE_SECRET:-mynextauthsecret_v2}"
      SALT: "${LANGFUSE_SALT:-salt-dev}"
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
    depends_on:
      - langfuse_db

  # ── Aplicação Principal Oráculo ──
  migration:
    <<: [*build, *app-env]
    container_name: oraculo_migration
    command: ["alembic", "upgrade", "head"]
    networks:
      - oraculo_net
    restart: "no"
    volumes:
      - ./migrations:/app/migrations  # 👈 E AQUI!

  api:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_api
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "9000", "--workers", "2", "--loop", "uvloop", "--no-access-log"]
    ports:
      - "${API_PORT:-9000}:9000"
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
      - ./migrations:/app/migrations
    networks:
      - oraculo_net
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_worker
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=default,admin,notificacoes"]
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
    networks:
      - oraculo_net

  beat:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_beat
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    volumes:
      - ./src:/app/src
    networks:
      - oraculo_net