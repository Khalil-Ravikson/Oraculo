# docker-compose.yml — Oráculo UEMA v6.2 (Dev/Stable) 
networks:
  oraculo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:

x-app-env: &app-env
  env_file: .env
  environment:
    # Usando IPs fixos para blindar contra falhas de DNS do WSL
    REDIS_URL: "redis://172.18.0.50:6379/0"
    DATABASE_URL: "postgresql+asyncpg://user:${POSTGRES_PASSWORD}@172.18.0.40:5432/oraculo"
    LLAMA_CLOUD_API_KEY: "${LLAMA_CLOUD_API_KEY}"

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-build: &build
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime

services:
  # ── Infraestrutura Oráculo ──
  postgres:
    image: postgres:16-alpine
    container_name: oraculo_postgres
    <<: [*restart, *logging]
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.40
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oraculo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d oraculo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: oraculo_redis
    <<: [*restart, *logging]
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.50
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: oraculo_redis_exporter
    <<: [*restart, *logging]
    environment:
      REDIS_ADDR: "redis://172.18.0.50:6379"
    networks:
      - oraculo_net

  # ── Observabilidade (Prometheus/Grafana) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: oraculo_prometheus
    <<: [*restart, *logging]
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - oraculo_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: oraculo_grafana
    <<: [*restart, *logging]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - oraculo_net

  # ── Aplicação Principal Oráculo ──
  migration:
    <<: [*build, *app-env]
    container_name: oraculo_migration
    command: ["alembic", "upgrade", "head"]
    networks:
      - oraculo_net
    restart: "no"
    volumes:
      - ./migrations:/app/migrations

  api:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_api
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "9000", "--workers", "2", "--loop", "uvloop", "--no-access-log"]
    ports:
      - "${API_PORT:-9000}:9000"
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
      - ./migrations:/app/migrations
    networks:
      - oraculo_net
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_worker
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=default,admin,notificacoes"]
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
    networks:
      - oraculo_net

  worker_rag:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_worker_rag
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker",
              "--loglevel=info", "--concurrency=2", "--queues=rag_search"]
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
    networks:
      - oraculo_net

  worker_synthesis:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_worker_synthesis
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker",
              "--loglevel=info", "--concurrency=2", "--queues=synthesis"]
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp/oraculo_cv
    networks:
      - oraculo_net

  worker_media:
    <<: [*build, *restart, *logging, *app-env]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker",
              "--loglevel=info", "--concurrency=2", "--queues=media"]
    volumes: ["./src:/app/src", "./dados:/app/dados", "/tmp:/tmp"]
    networks: [oraculo_net]

  worker_graph:
    <<: [*build, *restart, *logging, *app-env]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker",
              "--loglevel=info", "--concurrency=1", "--queues=graph"]
    volumes: ["./src:/app/src", "./dados:/app/dados"]
    networks: [oraculo_net]



  beat:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_beat
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "beat",
              "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    volumes:
      - ./src:/app/src
      - ./dados/tmp:/tmp/oraculo_cv
      - ./dados:/app/dados
    networks:
      - oraculo_net

  # ── EVOLUTION API v2.3.7 (Build Local do GitHub) ──
  evolution_api:
    build:
      context: https://github.com/EvolutionAPI/evolution-api.git#2.3.7
      dockerfile: Dockerfile
    container_name: oraculo_evolution
    <<: [*restart, *logging]
    ports:
      - "8081:8080" # O Dashboard e o Swagger ficam aqui no navegador Windows
    networks:
      - oraculo_net
    environment:
      # O SERVER_URL é como a API se vê no navegador
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - TZ=America/Sao_Paulo

      # Banco de Dados (Postgres do Oráculo)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      # Usamos o IP cego ou o nome do serviço para garantir conexão interna
      - DATABASE_CONNECTION_URI=postgresql://user:${POSTGRES_PASSWORD}@172.18.0.40:5432/oraculo?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true

      # Cache (Redis do Oráculo)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://172.18.0.50:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      
      # Webhook Global (Onde o teu bot escuta)
      - WEBHOOK_GLOBAL_URL=http://api:9000/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
    depends_on:
      - postgres
      - redis