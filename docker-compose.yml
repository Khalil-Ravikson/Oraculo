# docker-compose.yml — Oráculo UEMA v6.3 (Dev/Stable - Optimized)
networks:
  oraculo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:

# ── Modelos Base (Âncoras YAML) ────────────────────────────────────────────────
x-app-env: &app-env
  env_file: .env
  environment:
    # IPs fixos para mitigar falhas de DNS do subsistema WSL
    REDIS_URL: "redis://172.18.0.50:6379/0"
    DATABASE_URL: "postgresql+asyncpg://user:${POSTGRES_PASSWORD}@172.18.0.40:5432/oraculo"
    LLAMA_CLOUD_API_KEY: "${LLAMA_CLOUD_API_KEY}"

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-build: &build
  image: oraculo-app:latest
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime

# Modelo unificado para todos os workers do Celery (evita duplicação massiva de volumes e dependências)
x-worker-base: &worker-base
  <<: [*build, *restart, *logging, *app-env]
  volumes:
    - ./src:/app/src
    - ./dados:/app/dados
    # Isolamento de segurança: mapeia pasta temporária interna ao invés de expor o host /tmp
    - ./dados/tmp:/tmp
  networks:
    - oraculo_net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

# ── Perfis de recursos (contenção de memória/CPU por container) ────────────────
x-resources-light: &resources-light
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 512M

x-resources-heavy: &resources-heavy
  deploy:
    resources:
      limits:
        cpus: "1.5"
        memory: 1536M
      reservations:
        memory: 256M

services:
  # ── Infraestrutura Oráculo ──
  postgres:
    image: postgres:16-alpine
    container_name: oraculo_postgres
    <<: [*restart, *logging]
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.40
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oraculo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d oraculo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: oraculo_redis
    <<: [*restart, *logging]
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    networks:
      oraculo_net:
        ipv4_address: 172.18.0.50
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: oraculo_redis_exporter
    <<: [*restart, *logging, *resources-light]
    profiles: ["core"]
    environment:
      REDIS_ADDR: "redis://172.18.0.50:6379"
    networks:
      - oraculo_net

  # ── Observabilidade (Prometheus/Grafana) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: oraculo_prometheus
    <<: [*restart, *logging, *resources-light]
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - oraculo_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: oraculo_grafana
    <<: [*restart, *logging, *resources-light]
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - oraculo_net

  # ── Aplicação Principal e Migrações ──
  migration:
    <<: [*build, *app-env, *resources-light]
    container_name: oraculo_migration
    profiles: ["app"]
    command: ["alembic", "upgrade", "head"]
    networks:
      - oraculo_net
    restart: "no"
    volumes:
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: [*build, *restart, *logging, *app-env]
    container_name: oraculo_api
    profiles: ["app"]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "9000", "--workers", "2", "--loop", "uvloop", "--no-access-log"]
    ports:
      - "${API_PORT:-9000}:9000"
    volumes:
      - ./src:/app/src
      - ./dados:/app/dados
      - ./dados/tmp:/tmp
      - ./migrations:/app/migrations
      - ./templates:/app/templates
      - ./static:/app/static
    networks:
      - oraculo_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Workers Distribuidos Celery ──
  worker:
    <<: *worker-base
    container_name: oraculo_worker
    profiles: ["app"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=default,admin,notificacoes"]

  worker_rag:
    <<: [*worker-base, *resources-heavy]
    container_name: oraculo_worker_rag
    profiles: ["app"]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=rag_search"]

  worker_synthesis:
    <<: [*worker-base, *resources-heavy]
    container_name: oraculo_worker_synthesis
    profiles: ["app"]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=synthesis"]

  worker_media:
    <<: [*worker-base, *resources-heavy]
    container_name: oraculo_worker_media
    profiles: ["app"]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=media"]

  worker_graph:
    <<: *worker-base
    container_name: oraculo_worker_graph
    profiles: ["app"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=1", "--queues=graph"]

  beat:
    <<: [*worker-base, *resources-light]
    container_name: oraculo_beat
    profiles: ["app"]
    command: ["celery", "-A", "src.infrastructure.celery_app.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]

  # ── EVOLUTION API v2.3.7 (imagem oficial pré-compilada) ──
  # Nota: o Docker Hub do projeto mudou de organização — não é mais "atendai/evolution-api".
  evolution_api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: oraculo_evolution
    <<: [*restart, *logging]
    profiles: ["gateway"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    ports:
      - "8081:8080"
    networks:
      - oraculo_net
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - TZ=America/Sao_Paulo
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://user:${POSTGRES_PASSWORD}@172.18.0.40:5432/oraculo?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://172.18.0.50:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - WEBHOOK_GLOBAL_URL=http://api:9000/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      # --- Configurações de Comportamento Limpo ---
      - DEL_MESSAGE_INSTANCE=true           # Evita acumular lixo no banco da instância
      - WA_BUSINESS_TOKEN_VALIDATION=false  # Desativa validação pesada se não estiver usando API oficial
      # Estas flags abaixo controlam o que é enviado ao webhook
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false # Recomendado: ignorar eventos de deleção
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy