version: '3.8' # É sempre uma boa prática colocar a versão no topo

services:
  postgres:
    image: postgres:16-alpine
    container_name: oraculo_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: oraculo
    # Mudamos a porta do Host de 5432 para 5433
    ports:
      - "5433:5432"
    # Nome do volume explicitamente com prefixo
    volumes:
      - oraculo_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest
    container_name: oraculo_redis
    restart: always
    # Mudamos as portas do Host para não baterem com o meubotrag
    ports:
      - "6380:6379" # Porta do Banco de Dados Redis
      - "8002:8001" # Porta do RedisInsight (Painel Visual Embutido)
    volumes:
      - oraculo_redis_data:/data
    environment:
      - REDIS_ARGS=--appendonly yes

# Volumes nomeados de forma única para não sobrescrever os dados antigos
volumes:
  oraculo_postgres_data:
  oraculo_redis_data: