{% extends "hub/_base.html" %}

{% block title %}Simulador Web — Oráculo UEMA{% endblock %}

{% block content %}
<header>
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">
      <h1>Simulador Oráculo</h1>
      <span>TESTE DIRETO COM O GRAFO LANGGRAPH</span>
    </div>
  </div>
  <div class="header-right">
    <a href="/hub/" style="color: var(--accent); text-decoration: none; font-size: 14px; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 4px;">VOLTAR AO HUB</a>
  </div>
</header>

<main style="padding: 20px; display: flex; flex-direction: column; height: calc(100vh - 140px);">
    
<div id="chat-box" style="flex: 1; background: #0a0c0e; border: 1px solid #2a3140; border-radius: 8px; padding: 20px; overflow-y: auto; font-family: monospace; color: #fff; display: flex; flex-direction: column; gap: 15px;">        <div style="color: var(--accent); align-self: flex-start; max-width: 80%;">
            <strong>[ Oráculo UEMA ]</strong><br>
            Sessão iniciada. Como posso ajudar-te hoje, {{ username }}?
        </div>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <input type="text" id="chat-input" placeholder="Escreve a tua mensagem aqui (Testa o RAG ou comandos Admin)..." 
               style="flex: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-family: monospace; outline: none;">
        <button id="send-btn" style="background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Share Tech Mono';">ENVIAR</button>
    </div>
</main>

<script>
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // Gera um ID de thread único UMA VEZ quando a página carrega
    const threadId = 'web_session_' + Math.random().toString(36).substr(2, 9);

    function appendMessage(sender, text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.style.maxWidth = '80%';
        msgDiv.style.lineHeight = '1.5';
        
        if (isUser) {
            msgDiv.style.color = '#fff';
            msgDiv.style.alignSelf = 'flex-end';
            msgDiv.innerHTML = `<strong style="color: #888;">[ ${sender} ]</strong><br>${text}`;
        } else {
            msgDiv.style.color = 'var(--accent)';
            msgDiv.style.alignSelf = 'flex-start';
            const formattedText = text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = `<strong>[ ${sender} ]</strong><br>${formattedText}`;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const msg = chatInput.value.trim();
        if (!msg) return;

        // Limpa input e mostra a mensagem do User na tela
        chatInput.value = '';
        appendMessage('{{ username }}', msg, true);
        
        // Indicador de loading
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.style.color = '#666';
        loadingDiv.innerHTML = `<em>Processando...</em>`;
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        // PREPARAÇÃO PARA O STREAMING (SSE)
        const encodedMsg = encodeURIComponent(msg);
        const streamUrl = `/hub/chat/stream?msg=${encodedMsg}&thread_id=${threadId}`;
        
        try {
            const response = await fetch(streamUrl);
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            let isDone = false;
            let finalResponseText = "";

            while (!isDone) {
                const { value, done } = await reader.read();
                if (done) {
                    isDone = true;
                    break;
                }
                
                const chunkStr = decoder.decode(value, { stream: true });
                const lines = chunkStr.split("\n\n");
                
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataPayload = line.replace("data: ", "").trim();
                        if (!dataPayload) continue;

                        try {
                            const parsedData = JSON.parse(dataPayload);
                            
                            // Atualiza o loading com a rota
                            if (parsedData.type === 'route') {
                                document.getElementById(loadingId).innerHTML = `<em>[A pensar... rota: ${parsedData.route}]</em>`;
                            }
                            
                            // Captura HITL
                            if (parsedData.type === 'hitl') {
                                finalResponseText = parsedData.question;
                            }
                            
                            // Captura Resposta Normal
                            if (parsedData.type === 'response') {
                                finalResponseText = parsedData.text;
                                if (parsedData.crag > 0) {
                                    finalResponseText += `<br><br><small style="color: #4CAF50;">[RAG Score: ${parsedData.crag.toFixed(2)}]</small>`;
                                }
                            }
                            
                            // Finalização ou Erro
                            if (parsedData.type === 'done' || parsedData.type === 'error') {
                                isDone = true;
                                if (parsedData.type === 'error') {
                                    finalResponseText = `❌ Erro Interno: ${parsedData.msg}`;
                                }
                            }
                        } catch (err) {
                            console.error("Erro no JSON:", dataPayload);
                        }
                    }
                }
            }

            // Fim do stream: remove o loading e mostra a resposta final
            const loadingElem = document.getElementById(loadingId);
            if (loadingElem) loadingElem.remove();
            
            if (finalResponseText) {
                appendMessage('Oráculo UEMA', finalResponseText, false);
            } else {
                appendMessage('Sistema', 'Aviso: O motor não gerou texto.', false);
            }

        } catch (error) {
            const loadingElem = document.getElementById(loadingId);
            if (loadingElem) loadingElem.remove();
            appendMessage('Sistema', '❌ Falha de conexão com o servidor.', false);
        }
    }

    // Apenas UM listener para cada evento
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
