{% extends "hub/_base.html" %}

{% block content %}
<div class="dbg-root">
  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <textarea id="chat-input" class="chat-input" placeholder="Pergunte algo..."></textarea>
      <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
    </div>
  </div>

  <div class="debug-panel">
    <div class="debug-header"><span>COGNITIVE OS MONITOR</span></div>
    <div id="steps-container" style="padding:15px; color:#888; font-family:monospace; font-size:12px;">
      Aguardando processamento...
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const THREAD_ID = "{{ session_id }}";

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    // Coloca a msg na tela
    document.getElementById('chat-messages').innerHTML += `<div class="msg user">${msg}</div>`;
    input.value = '';
    
    const monitor = document.getElementById('steps-container');
    monitor.innerHTML = '<div style="color: blue;">[Iniciando Orquestração...]</div>';

    const source = new EventSource(`/hub/chat/stream?msg=${encodeURIComponent(msg)}&thread_id=${THREAD_ID}`);
    
    source.onmessage = (event) => {
        console.log("Chegou do backend:", event.data); // Aperte F12 para ver a mágica aqui!
        
        try {
            const d = JSON.parse(event.data);
            
            // Adiciona logs no painel da direita
            if (d.type === 'step' || d.type === 'start') {
                monitor.innerHTML += `<div style="margin-top: 4px;">⚙️ ${d.detail || d.name || 'Processando...'}</div>`;
            }
            
            // Adiciona resposta final na esquerda
            if (d.type === 'response') {
                const text = d.text ? d.text.replace(/\n/g, '<br>') : "⚠️ Resposta vazia gerada pelo Worker.";
                document.getElementById('chat-messages').innerHTML += `<div class="msg bot">${text}</div>`;
            }
            
            // Tratamento de ERRO visível
            if (d.type === 'error') {
                monitor.innerHTML += `<div style="color: red; margin-top: 4px;">❌ ERRO: ${d.msg}</div>`;
                document.getElementById('chat-messages').innerHTML += `<div class="msg bot" style="border: 1px solid red;">❌ Falha no sistema: Verifique o painel lateral.</div>`;
            }

            if (d.type === 'done') {
                monitor.innerHTML += `<div style="color: green; margin-top: 4px;">✅ Fluxo encerrado.</div>`;
                source.close();
            }
        } catch(e) {
            console.error("Falha no JSON do SSE:", e);
        }
    };
}
</script>
{% endblock %}
