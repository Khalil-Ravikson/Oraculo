{% extends "hub/_base.html" %}

{% block title %}Oráculo UEMA — Acesso Restrito{% endblock %}

{% block extra_css %}
<style>
  .login-container {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 80vh;
  }
  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 40px; width: 100%; max-width: 400px;
    position: relative;
  }
  .login-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--green);
  }
  .login-title {
    color: var(--green); font-family: var(--sans); font-size: 24px;
    text-transform: uppercase; margin-bottom: 24px; letter-spacing: 2px;
  }
  .input-group { margin-bottom: 24px; }
  .input-label {
    display: block; font-size: 11px; color: var(--text-dim);
    margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;
  }
  .auth-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--green); padding: 12px; font-family: var(--mono);
    outline: none; transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .auth-btn {
    width: 100%; background: var(--green-faint); border: 1px solid var(--border2);
    color: var(--green); padding: 12px; font-family: var(--sans);
    font-size: 16px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .auth-btn:hover { background: var(--green-glow); border-color: var(--green); }
  .error-msg {
    color: var(--red); font-size: 12px; margin-top: 16px;
    letter-spacing: 1px; text-align: center;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-box">
    <div class="login-title">// AUTENTICAÇÃO NECESSÁRIA</div>
    <form method="post" action="/admin/login">
      <div class="input-group">
        <label class="input-label" for="password">ACCESS_TOKEN_KEY</label>
        <input type="password" id="password" name="password" class="auth-input" autofocus required autocomplete="off">
      </div>
      <button type="submit" class="auth-btn">INICIAR SESSÃO</button>
      
      {% if erro %}
      <div class="error-msg">[ ERRO ] {{ erro }}</div>
      {% endif %}
    </form>
  </div>
</div>

<div class="terminal-bar">
  <span class="term-prompt">oraculo@uema:~$</span>
  <span class="term-text">aguardando credenciais administrativas...</span>
  <span class="term-blink"></span>
</div>
{% endblock %}
