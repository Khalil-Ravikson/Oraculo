# observability/prometheus.yml
# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — Scrape config para Oráculo UEMA
# IP 172.18.0.1:9000 = host da rede Docker (Windows/Empresa)
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s   # Intervalo padrão de coleta
  evaluation_interval: 15s   # Intervalo de avaliação de alertas
  scrape_timeout:      10s

# ── Targets ────────────────────────────────────────────────────────────────

scrape_configs:

  # FastAPI + prometheus-fastapi-instrumentator + métricas custom
  - job_name: "oraculo_api"
    static_configs:
      - targets: ["172.18.0.1:9000"]
        labels:
          env: "production"
          service: "oraculo_api"
    metrics_path: /metrics
    scheme: http
    # Aumenta timeout para evitar falso-positivo em cold start
    scrape_timeout: 8s

  # Redis Exporter (porta padrão 9121)
  # Imagem: oliver006/redis_exporter
  - job_name: "redis_exporter"
    static_configs:
      - targets: ["redis_exporter:9121"]
        labels:
          env: "production"
          service: "redis"
    metrics_path: /metrics

  # Langfuse (se expuser métricas — porta 3030 na imagem oficial)
  - job_name: "langfuse"
    static_configs:
      - targets: ["langfuse:3030"]
        labels:
          env: "production"
          service: "langfuse"
    metrics_path: /metrics
    # Ignora erro se Langfuse estiver offline
    honor_timestamps: true

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]